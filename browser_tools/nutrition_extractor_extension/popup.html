<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Nutrition Candidate Extractor</title>
    <style>
      body {
        width: 420px;
        margin: 0;
        padding: 14px;
        font-family: Arial, sans-serif;
        color: #1f2933;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .status {
        margin-bottom: 10px;
        color: #52606d;
        font-size: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 8px 0 12px;
        font-size: 12px;
      }

      th,
      td {
        border: 1px solid #d9e2ec;
        padding: 6px;
        text-align: left;
        vertical-align: top;
      }

      th {
        width: 46%;
        background: #f0f4f8;
      }

      button {
        border: 0;
        border-radius: 4px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font-size: 13px;
        padding: 8px 10px;
      }

      button.secondary {
        background: #52606d;
      }

      .buttons {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      textarea {
        width: 100%;
        min-height: 84px;
        box-sizing: border-box;
        font-family: Consolas, monospace;
        font-size: 11px;
      }

      .hint {
        color: #7b8794;
        font-size: 11px;
        line-height: 1.4;
      }

      .image-list {
        margin: 8px 0 12px;
        max-height: 220px;
        overflow: auto;
      }

      .image-item {
        display: grid;
        grid-template-columns: 72px 1fr;
        gap: 8px;
        padding: 8px 0;
        border-top: 1px solid #d9e2ec;
      }

      .image-item img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        border: 1px solid #d9e2ec;
        background: #f8fafc;
      }

      .image-meta {
        min-width: 0;
        font-size: 11px;
      }

      .image-meta code {
        display: block;
        overflow-wrap: anywhere;
        color: #52606d;
      }

      .image-meta button {
        margin-top: 6px;
        padding: 5px 7px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>Nutrition Candidate Extractor</h1>
    <div id="status" class="status">Reading current page...</div>
    <div id="result"></div>
    <div class="buttons">
      <button id="copy-row" type="button">Copy candidate row</button>
      <button id="copy-text" class="secondary" type="button">Copy page text</button>
    </div>
    <textarea id="tsv" readonly></textarea>
    <h1>Likely Nutrition Label Images</h1>
    <div id="images" class="image-list"></div>
    <p class="hint">
      Paste the copied row into the Google Sheet candidate columns. If the useful data is in an image, copy an image URL into the Sheet's ocr_image_url column and run Parse OCR image URLs.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
